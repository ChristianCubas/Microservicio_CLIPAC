<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Dashboard Clínica</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<!-- 🔥 FRAGMENTO PRINCIPAL DEL LAYOUT -->
<div th:fragment="dashboardLayout(title, content)">

    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar">

            <div class="sidebar-top">
                <button id="toggleSidebar" class="toggle-btn">
                    <i class="fas fa-bars"></i>
                </button>

                <img th:src="@{/imgs/clipac.png}" class="logo"/>
            </div>

            <ul class="menu ps-0">
                <li>
                    <a th:href="@{/tipos_trabajadores}">
                        <i class="fa-solid fa-shield"></i>
                        <span class="text">Roles & permisos</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/trabajadores}">
                        <i class="fa-solid fa-user"></i>
                        <span class="text">Trabajadores</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/pacientes}">
                        <i class="fas fa-user-injured"></i>
                        <span class="text">Pacientes</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/especialidades}">
                        <i class="fa-solid fa-briefcase-medical"></i>
                        <span class="text">Especialidades</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/horarios}">
                        <i class="fa-solid fa-clock"></i>
                        <span class="text">Horarios</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/consultorios}">
                        <i class="fa-solid fa-hospital"></i>
                        <span class="text">Consultorios</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/programaciones}">
                        <i class="fa-solid fa-calendar"></i>
                        <span class="text">Programación y horarios</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/citas}">
                        <i class="fas fa-calendar-check"></i>
                        <span class="text">Citas</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/prescripciones}">
                        <i class="fas fa-chart-line"></i>
                        <span class="text">Prescripciones médicas</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/medicamentos}">
                        <i class="fas fa-pills"></i>
                        <span class="text">Medicamentos</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/inventario}">
                        <i class="fas fa-boxes"></i>
                        <span class="text">Inventario</span>
                    </a>
                </li>

                <li>
                    <a th:href="@{/rotacion}">
                        <i class="fa-solid fa-arrows-rotate"></i>
                        <span class="text">Rotacion medicamentos</span>
                    </a>
                </li>
            </ul>

        </aside>

        <!-- CONTENIDO DINÁMICO -->
        <main class="main-content">
            <!-- 🔥 AQUÍ SE INYECTA EL CONTENIDO -->
            <div th:insert="${content}"></div>
        </main>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toggleBtn = document.getElementById("toggleSidebar");
        const sidebar = document.getElementById("sidebar");

        if (toggleBtn) {
            toggleBtn.addEventListener("click", function () {
                sidebar.classList.toggle("collapsed");
            });
        }
    });
</script>

</body>
</html>
