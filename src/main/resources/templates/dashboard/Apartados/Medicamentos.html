<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- DataTables CSS -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <title>Gestión de Medicamentos</title>

  <style>
    .badge-activo { background-color: #198754; }
    .badge-inactivo { background-color: #dc3545; }
    .btn-accion { margin-right: 5px; }
  </style>
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Medicamentos', ~{::contenido})}">

  <div th:fragment="contenido" class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3">Gestión de Medicamentos</h1>
      <a th:href="@{/medicamentos/nuevo}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Crear Medicamento
      </a>
    </div>

    <!-- TABLA -->
    <div class="table-responsive">
      <table id="tablaMedicamentos" class="table table-striped table-hover table-bordered align-middle">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Tipo</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Vencimiento</th>
          <th>Proveedor</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="med : ${medicamentos}">
          <td th:text="${med.idMedicamento}"></td>
          <td th:text="${med.nombre}"></td>
          <td th:text="${med.descripcion}"></td>
          <td th:text="${med.tipoMedicamento.nombre}"></td>
          <td th:text="${#numbers.formatDecimal(med.precio,1,2)}"></td>
          <td th:text="${med.stock}"></td>
          <td th:text="${med.fechaExpiracion}"></td>
          <td th:text="${med.proveedor.nombre}"></td>

          <td>
            <span class="badge"
                  th:text="${med.estado == 1 ? 'Activo' : 'Inactivo'}"
                  th:classappend="${med.estado == 1 ? ' badge-activo' : ' badge-inactivo'}">
            </span>
          </td>

          <td>
            <a th:href="@{/medicamentos/editar/{id}(id=${med.idMedicamento})}"
               class="btn btn-sm btn-warning btn-accion">
              <i class="fas fa-edit"></i>
            </a>

            <a th:href="@{/medicamentos/baja/{id}(id=${med.idMedicamento})}"
               class="btn btn-sm btn-secondary btn-accion">
              <i class="fas fa-ban"></i>
            </a>

            <a th:href="@{/medicamentos/eliminar/{id}(id=${med.idMedicamento})}"
               class="btn btn-sm btn-danger btn-accion"
               onclick="return confirm('¿Seguro que deseas eliminar este medicamento?')">
              <i class="fas fa-trash"></i>
            </a>
          </td>

        </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

      const toggleBtn = document.getElementById("toggleSidebar");
      const sidebar = document.getElementById("sidebar");

      if (toggleBtn) {
          toggleBtn.addEventListener("click", function () {
              sidebar.classList.toggle("collapsed");
          });
      }

      $('#tablaMedicamentos').DataTable({
          language: {
              url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
          },
          pageLength: 10,
          lengthMenu: [5, 10, 25, 50]
      });

  });
</script>

</body>
</html>
