<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- DataTables CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <title>Gestión de Pacientes</title>

    <style>
        /* Ajustes rápidos de badges */
        .badge-activo { background-color: #198754; }
        .badge-inactivo { background-color: #dc3545; }

        /* Botones de acción */
        .btn-accion { margin-right: 5px; }
    </style>
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Pacientes', ~{::contenido})}">

    <div th:fragment="contenido" class="container py-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3">Gestión de Pacientes</h1>
            <a th:href="@{/paciente/nuevo}" class="btn btn-primary">
                <i class="fas fa-plus"></i> Crear Paciente
            </a>
        </div>

        <!-- TABLA -->
        <div class="table-responsive">
            <table id="tablaPacientes" class="table table-striped table-hover table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>DNI</th>
                    <th>Nombres</th>
                    <th>Apellidos</th>
                    <th>Sexo</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Fecha nacimiento</th>
                    <th>Grupo sanguineo</th>
                    <th>Alergias</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="paciente : ${pacientes}">
                    <td th:text="${paciente.id_paciente}"></td>
                    <td th:text="${paciente.nroDocumento}"></td>
                    <td th:text="${paciente.nombres}"></td>

                    <td th:text="${paciente.apellidos}"></td>
                    <td th:text="${paciente.sexo}"></td>
                    <td th:text="${paciente.email}"></td>

                    <td th:text="${paciente.telefono}"></td>
                    <td th:text="${paciente.fechaNacimiento}"></td>
                    <td th:text="${paciente.grupoSanguineo}"></td>
                    <td th:text="${paciente.alergias}"></td>
                    <td>
            <span class="badge" th:text="${paciente.estado == 1 ? 'Activo' : 'Inactivo'}"
                  th:classappend="${paciente.estado == 1 ? ' badge-activo' : ' badge-inactivo'}">
            </span>
                    </td>
                    <td>
                        <a th:href="@{/paciente/editar/{id}(id=${paciente.id_paciente})}" class="btn btn-sm btn-warning btn-accion">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:href="@{/paciente/baja/{id}(id=${paciente.id_paciente})}" class="btn btn-sm btn-secondary btn-accion">
                            <i class="fas fa-user-slash"></i>
                        </a>
                        <a th:href="@{/paciente/eliminar/{id}(id=${paciente.id_paciente})}" class="btn btn-sm btn-danger btn-accion"
                           onclick="return confirm('¿Seguro que deseas eliminar este paciente?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        // Sidebar toggle
        const toggleBtn = document.getElementById("toggleSidebar");
        const sidebar = document.getElementById("sidebar");

        if (toggleBtn) {
            toggleBtn.addEventListener("click", function () {
                sidebar.classList.toggle("collapsed");
            });
        }

        // Inicializar DataTable
        $('#tablaPacientes').DataTable({
            language: {
                url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
            },
            pageLength: 10,
            lengthMenu: [5, 10, 25, 50]
        });

    });
</script>

</body>
</html>
