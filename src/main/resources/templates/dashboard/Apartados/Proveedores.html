<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- DataTables -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
  <title>Gestión de Proveedores</title>

  <style>
    .badge-activo { background-color: #198754; }
    .badge-inactivo { background-color: #dc3545; }
    .btn-accion { margin-right: 5px; }
  </style>
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Proveedores', ~{::contenido})}">

  <div th:fragment="contenido" class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3">Gestión de Proveedores</h1>
      <a th:href="@{/proveedores/nuevo}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Crear Proveedor
      </a>
    </div>

    <!-- TABLA -->
    <div class="table-responsive">
      <table id="tablaProveedores" class="table table-striped table-hover table-bordered align-middle">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Razón Social</th>
          <th>RUC</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Dirección</th>
          <th>Cuenta Bancaria</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="prov : ${proveedores}">
          <td th:text="${prov.id_proveedor}"></td>
          <td th:text="${prov.razon_social}"></td>
          <td th:text="${prov.nroRuc}"></td>
          <td th:text="${prov.telefono}"></td>
          <td th:text="${prov.correo}"></td>
          <td th:text="${prov.direccion}"></td>
          <td th:text="${prov.cuentaBancaria}"></td>

          <td>
                        <span class="badge"
                              th:text="${prov.estado == 1 ? 'Activo' : 'Inactivo'}"
                              th:classappend="${prov.estado == 1 ? ' badge-activo' : ' badge-inactivo'}">
                        </span>
          </td>

          <td>
            <a th:href="@{/proveedores/editar/{id}(id=${prov.id_proveedor})}"
               class="btn btn-sm btn-warning btn-accion">
              <i class="fas fa-edit"></i>
            </a>

            <a th:href="@{/proveedores/baja/{id}(id=${prov.id_proveedor})}"
               class="btn btn-sm btn-secondary btn-accion">
              <i class="fas fa-ban"></i>
            </a>

            <a th:href="@{/proveedores/eliminar/{id}(id=${prov.id_proveedor})}"
               class="btn btn-sm btn-danger btn-accion"
               onclick="return confirm('¿Seguro que deseas eliminar este proveedor?')">
              <i class="fas fa-trash"></i>
            </a>
          </td>

        </tr>
        </tbody>
      </table>
    </div>

  </div>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

      const toggleBtn = document.getElementById("toggleSidebar");
      const sidebar = document.getElementById("sidebar");

      if (toggleBtn) {
          toggleBtn.addEventListener("click", function () {
              sidebar.classList.toggle("collapsed");
          });
      }

      $('#tablaProveedores').DataTable({
          language: {
              url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
          },
          pageLength: 10,
          lengthMenu: [5, 10, 25, 50]
      });

  });
</script>

</body>
</html>
