<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <title>Rotación de Medicamentos</title>

    <style>
        .contenedor-lotes {
            width: 76vw;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 15px 0;
        }

        .caja-lote {
            min-width: 200px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            text-align: center;
            background: white;
            transition: transform 0.2s;
        }

        .caja-lote:hover {
            transform: scale(1.04);
        }

        /* COLORES SUAVES */
        .estado-naranja {
            background-color: #ffe5cc !important;
        }

        .estado-rojo {
            background-color: #ffd6d6 !important;
        }

        .estado-alerta {
            color: orange;
            font-size: 22px;
        }

        .badge-contador {
            background: #0d6efd;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Rotación de Medicamentos', ~{::contenido})}">

    <div th:fragment="contenido" class="container py-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Rotación de Medicamentos</h2>
            <span class="badge badge-contador text-white p-2">
            Total lotes: <span th:text="${lotes.size()}"></span>
        </span>
        </div>

        <!-- FILTROS -->
        <div class="card shadow-sm p-3 mb-4">
            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Proveedor</label>
                    <select class="form-select" id="selectProveedor">
                        <option value="">Seleccione proveedor</option>
                        <option th:each="p : ${proveedores}"
                                th:value="${p.id_proveedor}"
                                th:text="${p.razon_social}">
                        </option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Medicamento</label>
                    <select class="form-select" id="selectMedicamento">
                        <option value="">Seleccione medicamento</option>
                        <option th:each="m : ${medicamentos}"
                                th:value="${m.id_medicamento}"
                                th:text="${m.nombre}">
                        </option>
                    </select>
                </div>

                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-dark w-100 text-white" id="btnFiltrar">
                        <i class="fa-solid fa-filter"></i>
                        Filtrar
                    </button>
                </div>

            </div>
        </div>

        <!-- 🔥 TARJETAS -->
        <div class="contenedor-lotes">

            <div th:each="lote : ${lotes}"
                 class="caja-lote"
                 th:classappend="${
                lote.fechaExpiracion != null ?
                (
                    T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.fechaExpiracion) <= 2
                    ? 'estado-naranja'
                    : 'estado-rojo'
                )
                : ''
             }">

                <div class="fw-bold text-primary">
                    Lote: <span th:text="${lote.lote}"></span>
                </div>

                <div class="mt-2">
                    <b>Cantidad:</b><br>
                    <span th:text="${lote.cantidad}"></span>
                </div>

                <div class="mt-2 text-muted small">
                    Vence: <span th:text="${lote.fechaExpiracion}"></span>
                </div>

                <div class="mt-2 small">
                    <span th:text="${lote.medicamento.nombre}"></span>
                </div>

                <!-- ESTADO -->
                <div class="mt-3 fw-bold">

                <span th:if="${lote.medicamento.fecha_plazo == null}"
                      class="estado-alerta">⚠️</span>

                    <span th:if="${lote.fechaExpiracion != null}"
                          th:text="${
                        T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.fechaExpiracion) <= 2
                        ? '🟠 DESTRUIR'
                        : '🔴 A TIEMPO'
                      }"></span>
                </div>

            </div>

        </div>

        <!-- BOTONES -->
        <div class="row justify-content-center mt-4 gap-3">
            <button class="btn btn-primary col-md-3" id="descargarReporte">
                <i class="fa-solid fa-file"></i>
                Descargar Reporte
            </button>
            <button class="btn btn-success text-white col-md-3" id="descargarReporteDetallado">
                <i class="fa-solid fa-chart-column"></i>
                Reporte Detallado
            </button>
        </div>

        <!-- 🔥 TABLA -->
        <div class="mt-5">
            <h4 class="fw-bold mb-3">Lotes de Medicamentos</h4>
            <br>
            <div class="d-flex flex-direction-row gap-3">
                <p>Apto para aprovechar canje</p>
                <select id="estado" class="px-3 rounded">
                    <option value="1">Apto</option>
                    <option value="0">No apto</option>
                </select>
                <button class="btn btn-dark text-white" id="btnFiltrarCanje">
                    <i class="fa-solid fa-filter"></i>
                    Filtrar
                </button>
            </div>
            <br>
            <div class="table-responsive" id="tablaLotes">
                <table class="table table-bordered table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Medicamento</th>
                        <th>Lote</th>
                        <th>Cantidad</th>
                        <th>Fecha Expiración</th>
                        <th>Estado</th>
                        <th>Apto para rotar por canje</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="lote : ${lotes}"
                        th:classappend="${
                        lote.fechaExpiracion != null ?
                        (
                            T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.fechaExpiracion) <= 2
                            ? 'estado-naranja'
                            : 'estado-rojo'
                        )
                        : ''
                     }">

                        <td th:text="${lote.medicamento.nombre}"></td>
                        <td th:text="${lote.lote}"></td>
                        <td th:text="${lote.cantidad}"></td>
                        <td th:text="${lote.fechaExpiracion}"></td>

                        <td>
                        <span th:if="${lote.medicamento.fecha_plazo == null}"
                              class="estado-alerta">⚠️</span>

                            <span th:if="${lote.fechaExpiracion != null}"
                                  th:text="${
                                T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.fechaExpiracion) <= 2
                                ? '🟠 DESTRUIR'
                                : '🔴 A TIEMPO'
                              }"></span>
                        </td>
                        <td>
                            <span th:if="${lote.medicamento.fecha_plazo != null}"
                                  th:text="${
                                    T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.medicamento.fecha_plazo) >= 2 &&
                                    T(java.time.temporal.ChronoUnit).DAYS.between(T(java.time.LocalDate).now(), lote.medicamento.fecha_plazo) <= 7
                                    ? '🟢 SI'
                                    : '🔴 NO'
                            }"></span>
                        </td>

                    </tr>

                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script th:src="@{/js/rotacionMedicamentos.js}"></script>
</body>
</html>
