<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout(title=${titulo}, content=~{::main})}">

  <main class="main-content">

    <div class="container py-4">

      <div class="card shadow">

        <!-- HEADER DINÁMICO -->
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="fas fa-clock"></i>
            <span th:text="${titulo}">Gestión Horario</span>
          </h5>
        </div>

        <div class="card-body">

          <!-- MENSAJES -->
          <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

          <!-- FORMULARIO REUTILIZABLE -->
          <form th:action="@{${accion}}" method="post" th:object="${horario}">

            <!-- ID oculto para UPDATE -->
            <input type="hidden" th:field="*{id_horario}"/>

            <div class="row g-3">

              <!-- Hora Inicio -->
              <div class="col-md-6">
                <label class="form-label">Hora Inicio</label>
                <input type="time"
                       class="form-control"
                       th:field="*{hora_inicio}"
                       required>
              </div>

              <!-- Hora Fin -->
              <div class="col-md-6">
                <label class="form-label">Hora Fin</label>
                <input type="time"
                       class="form-control"
                       th:field="*{hora_fin}"
                       required>
              </div>

              <!-- Estado -->
              <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select class="form-select"
                        th:field="*{estado}">
                  <option value="1">Activo</option>
                  <option value="0">Inactivo</option>
                </select>
              </div>

              <!-- BOTONES -->
              <div class="col-12 text-end mt-4">

                <a th:href="@{/horarios}" class="btn btn-secondary">
                  <i class="fas fa-arrow-left"></i> Cancelar
                </a>

                <button type="submit" class="btn btn-success">
                  <i class="fas fa-save"></i>
                  <span th:text="${botonTexto}">Guardar</span>
                </button>

              </div>

            </div>

          </form>

        </div>

      </div>

    </div>

  </main>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
