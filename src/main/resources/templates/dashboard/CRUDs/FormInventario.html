<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${accion == 'nuevo'} ? 'Nuevo Movimiento Kardex' : 'Editar Movimiento Kardex'">
    Form Kardex Medicamento
  </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Kardex Medicamentos', ~{::contenido})}">

  <div th:fragment="contenido" class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 th:text="@{${titulo}}"></h2>

      <a th:href="@{/inventario}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Volver
      </a>
    </div>

    <!-- FORM -->
    <div class="card shadow-sm">
      <div class="card-body">

        <form th:action="@{${accion}}"
              th:object="${kardex}"
              method="post">

          <!-- ID oculto -->
          <input type="hidden" th:field="*{id_kardex_medicamento}"/>

          <div class="row">

            <!-- ✅ PROVEEDOR (SOLO VISUAL / FILTRO) -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Proveedor <span class="text-danger">*</span></label>
              <select id="selectProveedor" class="form-select" required>
                <option value="">Seleccione un proveedor</option>
                <option th:each="proveedor : ${proveedores}"
                        th:value="${proveedor.id_proveedor}"
                        th:text="${proveedor.razon_social}">
                </option>
              </select>
            </div>

            <!-- ✅ MEDICAMENTO (EL ÚNICO QUE SE ENVÍA AL BACKEND) -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Medicamento <span class="text-danger">*</span></label>
              <select id="selectMedicamento" class="form-select"
                      th:field="*{medicamento.id_medicamento}"
                      required>
                <option value="">Seleccione un medicamento</option>
              </select>
            </div>

            <!-- Tipo de Movimiento -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Tipo de Movimiento <span class="text-danger">*</span></label>
              <select class="form-select"
                      th:field="*{tipoMovimiento}"
                      required>
                <option value="">Seleccione</option>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
              </select>
            </div>

            <!-- Cantidad -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Cantidad <span class="text-danger">*</span></label>
              <input type="number"
                     min="1"
                     class="form-control"
                     th:field="*{cantidad}"
                     required>
            </div>

            <!-- Motivo -->
            <div class="col-md-12 mb-3">
              <label class="form-label">Motivo <span class="text-danger">*</span></label>
              <textarea class="form-control"
                        th:field="*{motivo}"
                        rows="3"
                        placeholder="Ej: Compra a proveedor, Venta a paciente, Devolución, etc."
                        required></textarea>
            </div>

            <!-- Fecha -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Fecha <span class="text-danger">*</span></label>
              <input type="datetime-local"
                     class="form-control"
                     th:field="*{fecha}"
                     required>
            </div>

            <!-- Lote -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Lote</label>
              <input type="text"
                     class="form-control"
                     th:field="*{lote}"
                     placeholder="Ej: LOT123456">
            </div>

            <!-- Fecha Expiración -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Fecha de Expiración</label>
              <input type="date"
                     class="form-control"
                     th:field="*{fechaExpiracion}">
            </div>

          </div>

          <!-- BOTONES -->
          <div class="mt-4 text-end">
            <a th:href="@{/inventario}" class="btn btn-secondary">
              Cancelar
            </a>
            <button type="submit" class="btn btn-success">
              <i class="fas fa-save"></i>
              <span th:text="${accion == 'nuevo'} ? 'Registrar Movimiento' : 'Actualizar Movimiento'"></span>
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/inventario.js}"></script>

</body>
</html>
