<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${accion == 'nuevo'} ? 'Nuevo Medicamento' : 'Editar Medicamento'">
    Form Medicamento
  </title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout('Medicamentos', ~{::contenido})}">

  <div th:fragment="contenido" class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 th:text="${accion == 'nuevo'} ? 'Registrar Medicamento' : 'Actualizar Medicamento'"></h2>

      <a th:href="@{/medicamentos}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Volver
      </a>
    </div>

    <!-- FORM -->
    <div class="card shadow-sm">
      <div class="card-body">

        <form th:action="@{/medicamentos/guardar}"
              th:object="${medicamento}"
              method="post">

          <!-- ID oculto -->
          <input type="hidden" th:field="*{idMedicamento}"/>

          <div class="row">

            <!-- Nombre -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Nombre</label>
              <input type="text"
                     class="form-control"
                     th:field="*{nombre}"
                     placeholder="Ej: Paracetamol 500mg"
                     required>
            </div>

            <!-- Precio -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Precio</label>
              <input type="number"
                     step="0.01"
                     min="0"
                     class="form-control"
                     th:field="*{precio}"
                     required>
            </div>

            <!-- Descripción -->
            <div class="col-md-12 mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control"
                        th:field="*{descripcion}"
                        rows="3"
                        required></textarea>
            </div>

            <!-- Stock -->
            <div class="col-md-4 mb-3">
              <label class="form-label">Stock</label>
              <input type="number"
                     min="0"
                     class="form-control"
                     th:field="*{stock}"
                     required>
            </div>

            <!-- Fecha Expiración -->
            <div class="col-md-4 mb-3">
              <label class="form-label">Fecha de Expiración</label>
              <input type="date"
                     class="form-control"
                     th:field="*{fechaExpiracion}"
                     required>
            </div>

            <!-- Estado -->
            <div class="col-md-4 mb-3">
              <label class="form-label">Estado</label>
              <select class="form-select"
                      th:field="*{estado}">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
              </select>
            </div>

            <!-- Tipo Medicamento -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Tipo de Medicamento</label>
              <select class="form-select"
                      th:field="*{tipoMedicamento}"
                      required>
                <option value="">Seleccione</option>
                <option th:each="tipo : ${tipos}"
                        th:value="${tipo.idTipoMedicamento}"
                        th:text="${tipo.nombre}">
                </option>
              </select>
            </div>

            <!-- Proveedor -->
            <div class="col-md-6 mb-3">
              <label class="form-label">Proveedor</label>
              <select class="form-select"
                      th:field="*{proveedor}"
                      required>
                <option value="">Seleccione</option>
                <option th:each="prov : ${proveedores}"
                        th:value="${prov.idProveedor}"
                        th:text="${prov.nombre}">
                </option>
              </select>
            </div>

          </div>

          <!-- BOTONES -->
          <div class="mt-4 text-end">
            <a th:href="@{/medicamentos}" class="btn btn-secondary">
              Cancelar
            </a>
            <button type="submit" class="btn btn-success">
              <i class="fas fa-save"></i>
              <span th:text="${accion == 'nuevo'} ? 'Guardar' : 'Actualizar'"></span>
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

</body>
</html>
