<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- DataTables CSS -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{dashboard-layout :: dashboardLayout(title='Nueva Programación', content=~{::main})}">

  <main class="main-content">

    <div class="container py-4">

      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="fas fa-calendar-plus"></i> Crear Programación
          </h5>
        </div>

        <div class="card-body">

          <form th:action="@{/programaciones/guardar}" method="post">

            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Trabajador</label>
                <select name="trabajadorId" class="form-select" required>
                  <option value="">Seleccione</option>
                  <option th:each="t : ${trabajadores}"
                          th:value="${t.id_trabajador}"
                          th:text="${t.nombres + ' ' + t.apellidos}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Consultorio</label>
                <select name="consultorioId" class="form-select" required>
                  <option value="">Seleccione</option>
                  <option th:each="c : ${consultorios}"
                          th:value="${c.id_consultorio}"
                          th:text="${c.nombre}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Horario</label>
                <select name="horarioId" class="form-select" required>
                  <option value="">Seleccione</option>
                  <option th:each="h : ${horarios}"
                          th:value="${h.id_horario}"
                          th:text="${h.hora_inicio + ' - ' + h.hora_fin}">
                  </option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Día (1=Lun ... 7=Dom)</label>
                <input type="number" name="dia" min="1" max="7"
                       class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                  <option value="1">Activo</option>
                  <option value="0">Inactivo</option>
                </select>
              </div>

              <div class="col-12 text-end mt-3">
                <a th:href="@{/programaciones}" class="btn btn-secondary">
                  Cancelar
                </a>

                <button type="submit" class="btn btn-success">
                  Guardar
                </button>
              </div>

            </div>

          </form>

        </div>
      </div>

    </div>

  </main>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

      // Sidebar toggle
      const toggleBtn = document.getElementById("toggleSidebar");
      const sidebar = document.getElementById("sidebar");

      if (toggleBtn) {
          toggleBtn.addEventListener("click", function () {
              sidebar.classList.toggle("collapsed");
          });
      }

      // Inicializar DataTable
      $('#tablaPacientes').DataTable({
          language: {
              url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json"
          },
          pageLength: 10,
          lengthMenu: [5, 10, 25, 50]
      });

  });
</script>
</body>
</html>
