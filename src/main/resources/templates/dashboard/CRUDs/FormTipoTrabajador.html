<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- DataTables CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<div th:replace="~{dashboard-layout :: dashboardLayout(title='Nuevo Tipo de Trabajador', content=~{::main})}">

    <main class="main-content">
        <div class="container py-4">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-user-tag"></i>
                        <span th:text="${titulo}"></span>
                    </h5>
                </div>

                <div class="card-body">

                    <form th:action="@{${accion}}"
                          th:object="${tipoTrabajador}"
                          method="post">

                        <div class="row g-3">

                            <!-- Nombre -->
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-id-badge"></i> Nombre
                                </label>
                                <input type="text"
                                       th:field="*{nombre}"
                                       class="form-control"
                                       placeholder="Ej: Médico, Enfermero, Administrativo"
                                       required>
                            </div>

                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-toggle-on"></i> Estado
                                </label>
                                <select th:field="*{estado}" class="form-select">
                                    <option value="1">Activo</option>
                                    <option value="0">Inactivo</option>
                                </select>
                            </div>

                            <!-- Botones -->
                            <div class="col-12 text-end mt-3">

                                <a th:href="@{/tipos_trabajadores}"
                                   class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Cancelar
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    <i class="fas fa-save"></i> Guardar
                                </button>

                            </div>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </main>

</div>


<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        // Sidebar toggle
        const toggleBtn = document.getElementById("toggleSidebar");
        const sidebar = document.getElementById("sidebar");

        if (toggleBtn) {
            toggleBtn.addEventListener("click", function () {
                sidebar.classList.toggle("collapsed");
            });
        }

    });
</script>

</body>
</html>
