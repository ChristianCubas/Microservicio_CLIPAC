<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- DataTables CSS -->
    <link rel="stylesheet"
          href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <style>
        .badge-activo { background-color: #198754; }
        .badge-inactivo { background-color: #dc3545; }
        .btn-accion { margin-right: 5px; }
    </style>

    <title th:text="${titulo}">Trabajador</title>
</head>

<body>

<div th:replace="~{dashboard-layout :: dashboardLayout(title=${titulo}, content=~{::main})}">

    <main class="main-content">

        <div class="container py-4">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-user"></i>
                        <span th:text="${titulo}"></span>
                    </h5>
                </div>

                <div class="card-body">

                    <form th:action="@{${accion}}"
                          th:object="${trabajador}"
                          method="post">

                        <input type="hidden" th:field="*{id_trabajador}"/>

                        <div class="row g-3">

                            <!-- Tipo Trabajador -->
                            <div class="col-md-6">
                                <label class="form-label">Tipo Trabajador</label>
                                <select class="form-select"
                                        th:field="*{tipoTrabajador.id_tipo_trabajador}" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="t : ${tipos}"
                                            th:value="${t.id_tipo_trabajador}"
                                            th:text="${t.nombre}">
                                    </option>
                                </select>
                            </div>

                            <!-- DNI -->
                            <div class="col-md-6">
                                <label class="form-label">DNI</label>
                                <input type="text" class="form-control"
                                       th:field="*{nroDocumento}" required>
                            </div>

                            <!-- Nombres -->
                            <div class="col-md-6">
                                <label class="form-label">Nombres</label>
                                <input type="text" class="form-control"
                                       th:field="*{nombres}" required>
                            </div>

                            <!-- Apellidos -->
                            <div class="col-md-6">
                                <label class="form-label">Apellidos</label>
                                <input type="text" class="form-control"
                                       th:field="*{apellidos}" required>
                            </div>

                            <!-- Teléfono -->
                            <div class="col-md-6">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-control"
                                       th:field="*{telefono}" required>
                            </div>

                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control"
                                       th:field="*{email}" required>
                            </div>

                            <!-- Dirección -->
                            <div class="col-md-6">
                                <label class="form-label">Dirección</label>
                                <input type="text" class="form-control"
                                       th:field="*{direccion}" required>
                            </div>

                            <!-- Colegiatura -->
                            <div class="col-md-6">
                                <label class="form-label">Colegiatura</label>
                                <input type="text" class="form-control"
                                       th:field="*{colegiatura}">
                            </div>

                            <!-- Contraseña -->
                            <div class="col-md-6">
                                <label class="form-label">Contraseña</label>
                                <input type="password" class="form-control"
                                       th:field="*{contrasenia}" required>
                            </div>

                            <!-- Especialidades -->
                            <div class="col-md-6">
                                <label class="form-label">Especialidades</label>
                                <select multiple class="form-select"
                                        th:field="*{especialidades}">
                                    <option th:each="e : ${especialidades}"
                                            th:value="${e.id_especialidad}"
                                            th:text="${e.nombre}">
                                    </option>
                                </select>
                            </div>

                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <select class="form-select" th:field="*{estado}">
                                    <option th:value="1">Activo</option>
                                    <option th:value="0">Inactivo</option>
                                </select>
                            </div>

                            <!-- Botones -->
                            <div class="col-12 text-end mt-4">
                                <a th:href="@{/trabajadores}"
                                   class="btn btn-secondary">
                                    Cancelar
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    <i class="fas fa-save"></i>
                                    <span th:text="${botonTexto}"></span>
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

        </div>

    </main>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const toggleBtn = document.getElementById("toggleSidebar");
        const sidebar = document.getElementById("sidebar");

        if (toggleBtn) {
            toggleBtn.addEventListener("click", function () {
                sidebar.classList.toggle("collapsed");
            });
        }

    });
</script>

</body>
</html>
