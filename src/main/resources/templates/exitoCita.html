<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cita Exitosa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="alert alert-success">
    <h4>✅ <i class="bi bi-check-circle"></i> Cita registrada exitosamente</h4>
  </div>

  <h2 class="mb-4">📋 Tus Citas</h2>

  <div th:if="${citasPaciente != null and !citasPaciente.isEmpty()}">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>ID Cita</th>
        <th>Fecha/Hora</th>
        <th>Especialidad</th>
        <th>Médico</th>
        <th>Consultorio</th>
        <th>Modalidad</th>
        <th>Estado</th>
      </tr>
      </thead>
      <tbody>

      <tr th:each="cita : ${citasPaciente}">
        <td th:text="${cita.id_cita}"></td>
        <td>
          <span th:text="${cita.programacion.fecha} + ' ' + ${cita.programacion.horario?.hora_inicio}"></span>
        </td>
        <td th:text="${cita.programacion.trabajador?.especialidad?.nombre}"></td>
        <td th:text="${cita.programacion.trabajador?.nombres} + ' ' + ${cita.programacion.trabajador?.apellidos}"></td>
        <td th:text="${cita.programacion.id_consultorio}"></td>
        <td>
          <span th:if="${cita.modalidad == 1}" class="badge bg-success">🏥 Presencial</span>
          <span th:if="${cita.modalidad == 2}" class="badge bg-info">💻 Virtual</span>
        </td>
        <td>
          <span th:if="${cita.estado == 1}" class="badge bg-success">Confirmada</span>
          <span th:if="${cita.estado != 1}" class="badge bg-warning">Pendiente</span>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- Si no hay citas -->
  <div th:if="${citasPaciente == null or citasPaciente.isEmpty()}" class="alert alert-info">
    <p>No tienes citas registradas aún.</p>
  </div>

  <a href="/citas/nuevo" class="btn btn-primary">Reservar Nueva Cita</a>
  <a href="/" class="btn btn-secondary">Volver al Inicio</a>
</div>
</body>
</html>
