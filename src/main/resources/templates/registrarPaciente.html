<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registro de Paciente</title>
  <!-- jQuery primero, luego Toastr -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

  <link rel="stylesheet" href="/css/registrarPaciente.css">
</head>
<body>

<!-- ===== HEADER (IGUAL) ===== -->
<header>
  <div class="container">
    <div class="logo">
      <img src="/imgs/clipac.png" alt="Logo Clínica">
    </div>
    <nav>
      <a href="/">Inicio</a>
      <a href="#especialidades">Especialidades</a>
      <a href="#nosotros">Nosotros</a>
      <a href="/pacientes/nuevo">Regístrate</a>
      <a href="/iniciarSesion">Iniciar Sesión</a>
    </nav>
  </div>
</header>

<!-- ===== CONTENIDO NUEVO ===== -->
<section class="form-section">
  <div class="form-container">
    <h2>Registro de Paciente</h2>

    <form th:action="@{/pacientes/guardar}" th:object="${paciente}" method="post">

      <div class="form-grid">

        <div class="form-group">
          <label>Tipo Documento</label>
          <select th:field="*{tipoDocumento}" required>
            <option value="">Seleccione</option>
            <option value="DNI">DNI</option>
            <option value="Pasaporte">Pasaporte</option>
            <option value="Carnet Extranjería">Carnet Extranjería</option>
          </select>
        </div>

        <div class="form-group">
          <label>N° Documento</label>
          <input type="text" th:field="*{nroDocumento}" required>
        </div>

        <div class="form-group">
          <label>Nombres</label>
          <input type="text" th:field="*{nombres}" required>
        </div>

        <div class="form-group">
          <label>Apellidos</label>
          <input type="text" th:field="*{apellidos}" required>
        </div>

        <div class="form-group">
          <label>Fecha de Nacimiento</label>
          <input type="date" th:field="*{fechaNacimiento}" required>
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <select th:field="*{sexo}" required>
            <option value="">Seleccione</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Femenino</option>
          </select>
        </div>

        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" th:field="*{telefono}" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" th:field="*{email}" required>
        </div>

        <div class="form-group full">
          <label>Dirección</label>
          <input type="text" th:field="*{direccion}" required>
        </div>

        <div class="form-group">
          <label>Grupo Sanguíneo</label>
          <select th:field="*{grupoSanguineo}" required>
            <option value="">Seleccione</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
          </select>
        </div>

        <div class="form-group">
          <label>Alergias</label>
          <input type="text" th:field="*{alergias}" required>
        </div>

        <div class="form-group full">
          <label>Contrasenia</label>
          <input type="text" th:field="*{contrasenia}" required>
        </div>

      </div>

      <button type="submit" class="btn-primary">Registrar Paciente</button>

    </form>
  </div>
</section>

<!-- ===== FOOTER (IGUAL) ===== -->
<footer>
  <div class="footer-container">
    <div>
      <h4>Clínica del Pacífico</h4>
      <p>Av. Principal 123 - Lima, Perú</p>
      <p>Tel: (01) 123-4567</p>
    </div>
    <div>
      <h4>Horario</h4>
      <p>Lunes - Sábado</p>
      <p>8:00 am - 8:00 pm</p>
    </div>
    <div>
      <h4>Emergencias</h4>
      <p>Disponible 24/7</p>
    </div>
  </div>
  <p class="copyright">© 2026 Clínica del Pacífico - Todos los derechos reservados</p>
</footer>
<script th:if="${mensaje}">
  $(document).ready(function() {
      setTimeout(function() {
          console.log("🚀 DEBUG - TIPO:", '[[${tipo}]]', "MSG:", '[[${mensaje}]]');

          toastr.options = {
              "positionClass": "toast-top-right",
              "timeOut": "5000",
              "progressBar": true
          };

          toastr.success('[[${mensaje}]]');
      }, 100);  // 100ms delay garantiza que toastr esté listo
  });
</script>
</body>
</html>
